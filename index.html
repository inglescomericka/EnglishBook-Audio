<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Minha Biblioteca de Áudios</title>

<style>
body {
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    max-width: 700px;
    margin: auto;
    padding: 30px;
}

h1 {
    text-align: center;
}

.audio-box {
    background: #222;
    padding: 20px;
    margin: 20px 0;
    border-radius: 10px;
}

audio {
    width: 100%;
}
</style>

</head>

<body>

<h1>🎧 Meus Áudios</h1>


<div class="audio-box">
<h2>Aula 1 - Introdução</h2>

<audio controls>
<source src="audio/aula1.mp3" type="audio/mpeg">
Seu navegador não suporta áudio.
</audio>

</div>


<div class="audio-box">
<h2>Aula 2 - Conversação</h2>

<audio controls>
<source src="audio/aula2.mp3" type="audio/mpeg">
</audio>

</div>


<div class="audio-box">
<h2>Música</h2>

<audio controls>
<source src="audio/musica.mp3" type="audio/mpeg">
</audio>

</div>


</body>
</html>
